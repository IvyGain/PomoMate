<!DOCTYPE html>
<html>
<head>
    <title>Pomodoro Play - モバイルアクセス</title>
    <meta charset="UTF-8">
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
            display: inline-block;
            margin-top: 50px;
        }
        .qr-code {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin: 20px;
            display: inline-block;
        }
        .instructions {
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: left;
        }
        .url {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            word-break: break-all;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍅 Pomodoro Play</h1>
        <p>スマートフォンでアプリにアクセス</p>
        
        <div class="qr-code">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=exp://192.168.1.13:8081" alt="QR Code">
        </div>
        
        <div class="instructions">
            <h3>📱 アクセス方法:</h3>
            <ol>
                <li>スマートフォンに <strong>Expo Go</strong> アプリをインストール
                    <br>📱 iOS: App Store / Android: Google Play
                </li>
                <li>Expo Go アプリを開く</li>
                <li>上のQRコードをスキャン、または下記URLを手動入力:</li>
            </ol>
            
            <div class="url">exp://192.168.1.13:8081</div>
            
            <p><strong>注意:</strong> スマートフォンとパソコンが同じWi-Fiネットワークに接続されている必要があります。</p>
        </div>
        
        <p style="margin-top: 30px; opacity: 0.8;">
            🎮 ポモドーロタイマーでゲーム感覚で集中力アップ！
        </p>
    </div>
</body>
</html>
